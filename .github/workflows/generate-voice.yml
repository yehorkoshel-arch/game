name: Generate voice assets

on:
  workflow_dispatch:
    inputs:
      voice:
        description: "Ukrainian Edge TTS voice"
        required: true
        default: "uk-UA-OstapNeural"
      group:
        description: "Optional group from voice-lines.json"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Generate voice files
        run: |
          if [ -n "${{ inputs.group }}" ]; then
            npm run voice:generate -- --voice "${{ inputs.voice }}" --group "${{ inputs.group }}" --force
          else
            npm run voice:generate -- --voice "${{ inputs.voice }}" --force
          fi

      - name: Commit generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/audio/voice src/audio/voiceManifest.js
          if git diff --cached --quiet; then
            echo "No generated voice changes"
          else
            git commit -m "Generate Ukrainian voice assets"
            git push
          fi
