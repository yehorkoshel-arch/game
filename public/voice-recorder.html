<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Kyiv Runner Voice Recorder</title>
    <style>
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #0d1117;
        color: #e6edf3;
      }
      main {
        max-width: 980px;
        margin: 0 auto;
        padding: 24px;
      }
      h1 {
        margin: 0 0 16px;
        font-size: 24px;
      }
      .toolbar {
        display: flex;
        gap: 10px;
        align-items: center;
        flex-wrap: wrap;
        margin-bottom: 16px;
      }
      button, select {
        border: 1px solid #30363d;
        border-radius: 6px;
        background: #161b22;
        color: #e6edf3;
        padding: 8px 10px;
        font: inherit;
      }
      button {
        cursor: pointer;
      }
      button.primary {
        border-color: #2f81f7;
        background: #1f6feb;
      }
      button.danger {
        border-color: #da3633;
        background: #6e1f1f;
      }
      button:disabled {
        cursor: not-allowed;
        opacity: 0.55;
      }
      .status {
        min-height: 20px;
        color: #8b949e;
      }
      .line {
        display: grid;
        grid-template-columns: 128px 1fr auto;
        gap: 12px;
        align-items: start;
        padding: 14px 0;
        border-top: 1px solid #21262d;
      }
      .id {
        color: #7ee787;
        font-family: ui-monospace, SFMono-Regular, Consolas, monospace;
        font-size: 12px;
        overflow-wrap: anywhere;
      }
      .text {
        line-height: 1.45;
      }
      .speaker {
        color: #f2cc60;
        font-size: 12px;
        margin-bottom: 4px;
      }
      .actions {
        display: flex;
        gap: 8px;
        justify-content: flex-end;
        flex-wrap: wrap;
      }
      .manifest {
        margin-top: 8px;
        padding: 8px;
        border-radius: 6px;
        background: #010409;
        color: #8b949e;
        font-family: ui-monospace, SFMono-Regular, Consolas, monospace;
        font-size: 11px;
        overflow-wrap: anywhere;
      }
      @media (max-width: 720px) {
        main { padding: 16px; }
        .line { grid-template-columns: 1fr; }
        .actions { justify-content: flex-start; }
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Kyiv Runner Voice Recorder</h1>
      <div class="toolbar">
        <button class="primary" id="micBtn" type="button">Увімкнути мікрофон</button>
        <select id="groupFilter">
          <option value="">Усі репліки</option>
        </select>
        <button id="copyManifestBtn" type="button">Копіювати manifest</button>
      </div>
      <div class="status" id="status">Натисни «Увімкнути мікрофон», потім записуй репліки по одній.</div>
      <div id="lines"></div>
    </main>

    <script type="module">
      const statusEl = document.getElementById("status");
      const linesEl = document.getElementById("lines");
      const micBtn = document.getElementById("micBtn");
      const groupFilter = document.getElementById("groupFilter");
      const copyManifestBtn = document.getElementById("copyManifestBtn");
      let stream = null;
      let recorder = null;
      let activeLine = null;
      let chunks = [];
      let lines = [];

      const normalizeSpeechText = (text) =>
        String(text || "")
          .replace(/Роботрон-9000/g, "Роботрон девʼять тисяч")
          .replace(/Роботрон девять тисяч/g, "Роботрон девʼять тисяч")
          .replace(/ТЦК/g, "те це ка")
          .replace(/Києве/g, "Києве")
          .replace(/Слава Україні/g, "Слава Україні")
          .replace(/УРА/g, "Ура")
          .replace(/ПЕРЕМОГА/g, "Перемога")
          .replace(/[.,!?;:…"'“”„«»()[\]{}<>—–-]/g, " ")
          .replace(/[ʼ'`]/g, "")
          .replace(/\s+/g, " ")
          .trim();

      const fileUrlFor = (line) => `/game/audio/voice/${line.id}.webm`;
      const manifestEntryFor = (line) => `"${normalizeSpeechText(line.text)}": "${fileUrlFor(line)}"`;

      function setStatus(text) {
        statusEl.textContent = text;
      }

      function renderFilters() {
        const groups = [...new Set(lines.map((line) => line.group))];
        groups.forEach((group) => {
          const option = document.createElement("option");
          option.value = group;
          option.textContent = group;
          groupFilter.appendChild(option);
        });
      }

      function renderLines() {
        const selectedGroup = groupFilter.value;
        linesEl.innerHTML = "";
        lines
          .filter((line) => !selectedGroup || line.group === selectedGroup)
          .forEach((line) => {
            const row = document.createElement("section");
            row.className = "line";
            row.innerHTML = `
              <div class="id">${line.id}.webm</div>
              <div>
                ${line.speaker ? `<div class="speaker">${line.speaker}</div>` : ""}
                <div class="text">${line.text}</div>
                <div class="manifest">${manifestEntryFor(line)}</div>
              </div>
              <div class="actions">
                <button class="primary record" type="button">Запис</button>
                <button class="danger stop" type="button" disabled>Стоп</button>
                <button class="copy" type="button">Copy map</button>
              </div>
            `;
            row.querySelector(".record").onclick = () => startRecording(line, row);
            row.querySelector(".stop").onclick = () => stopRecording();
            row.querySelector(".copy").onclick = async () => {
              await navigator.clipboard.writeText(manifestEntryFor(line) + ",");
              setStatus(`Скопійовано manifest для ${line.id}`);
            };
            linesEl.appendChild(row);
          });
      }

      async function ensureMic() {
        if (stream) return stream;
        stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        setStatus("Мікрофон увімкнено. Можна записувати.");
        micBtn.disabled = true;
        return stream;
      }

      async function startRecording(line, row) {
        await ensureMic();
        if (recorder && recorder.state === "recording") recorder.stop();
        activeLine = line;
        chunks = [];
        recorder = new MediaRecorder(stream, { mimeType: "audio/webm" });
        recorder.ondataavailable = (event) => {
          if (event.data.size > 0) chunks.push(event.data);
        };
        recorder.onstop = () => saveRecording(activeLine);
        recorder.start();
        document.querySelectorAll(".record").forEach((button) => (button.disabled = true));
        document.querySelectorAll(".stop").forEach((button) => (button.disabled = true));
        row.querySelector(".stop").disabled = false;
        setStatus(`Запис: ${line.id}`);
      }

      function stopRecording() {
        if (recorder && recorder.state === "recording") recorder.stop();
      }

      function saveRecording(line) {
        document.querySelectorAll(".record").forEach((button) => (button.disabled = false));
        document.querySelectorAll(".stop").forEach((button) => (button.disabled = true));
        if (!line || chunks.length === 0) return;
        const blob = new Blob(chunks, { type: "audio/webm" });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = `${line.id}.webm`;
        link.click();
        setTimeout(() => URL.revokeObjectURL(url), 1000);
        setStatus(`Збережено ${line.id}.webm. Поклади файл у public/audio/voice/`);
      }

      micBtn.onclick = () => ensureMic().catch((err) => setStatus(`Помилка мікрофона: ${err.message}`));
      groupFilter.onchange = renderLines;
      copyManifestBtn.onclick = async () => {
        const text = lines.map((line) => manifestEntryFor(line) + ",").join("\n");
        await navigator.clipboard.writeText(text);
        setStatus("Скопійовано manifest для всіх реплік.");
      };

      lines = await fetch("./audio/voice/voice-lines.json").then((res) => res.json());
      renderFilters();
      renderLines();
    </script>
  </body>
</html>
